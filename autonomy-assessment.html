<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Autonomous IT Readiness Assessment</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        .quiz-container { max-width: 600px; margin: auto; }\n        .question { margin: 20px 0; }\n        .submit-btn { margin-top: 20px; padding: 10px 15px; }\n    </style>\n</head>\n<body>\n    <div class="quiz-container">\n        <h1>Autonomous IT Readiness Assessment</h1>\n        <form id="quiz-form">\n            <div class="question">\n                <label for="q1">1. Does your organization use automation tools?</label>\n                <select id="q1" name="q1">\n                    <option value="yes">Yes</option>\n                    <option value="no">No</option>\n                </select>\n            </div>\n            <div class="question">\n                <label for="q2">2. How often do you review your IT processes?</label>\n                <select id="q2" name="q2">\n                    <option value="frequently">Frequently</option>\n                    <option value="occasionally">Occasionally</option>\n                    <option value="rarely">Rarely</option>\n                </select>\n            </div>\n            <div class="question">\n                <label for="q3">3. Is your team trained in automation methodologies?</label>\n                <select id="q3" name="q3">\n                    <option value="yes">Yes</option>\n                    <option value="no">No</option>\n                </select>\n            </div>\n            <button type="submit" class="submit-btn">Submit</button>\n        </form>\n    </div>\n    <script>\n        document.getElementById('quiz-form').onsubmit = function(e) {\n            e.preventDefault();\n            alert('Thank you for completing the assessment!');\n        };\n    </script>\n</body>\n</html>
